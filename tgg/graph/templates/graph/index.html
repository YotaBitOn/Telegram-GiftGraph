{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gift Chain</title>
    <link rel="stylesheet" href="{% static 'graph/css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>

<body>
<form id="config-form">
<div class="main-container">
    <div class="container" id="tg-id-container">
        <input type="text" id="tg-id" name="tg-id" placeholder="Enter user's @" onmouseenter="this.focus(); this.select();">
        <button id="submit" type="submit"> <i class="fa-solid fa-check" id="check-icon"></i> </button>
    </div>

    <br>
    <br>
    <div class="container" id="depth-container">

        <label id="depth-label" for="depth">Exploration depth</label>
        <br>
        <input type="range" id="depth" name="depth" min="2" max="12" value="4" list="markers">
        <br>
        <datalist id="markers">
            <option value="4" label="Freezing"></option>
            <option value="6"></option>
            <option value="8" label="Mild"></option>
            <option value="10"></option>
            <option value="12" label="Hot"></option>


        </datalist>

        <div class="range-labels">
            <span>2</span>
            <span>4</span>
            <span>6</span>
            <span>8</span>
            <span>10</span>
            <span>12</span>
        </div>
    </div>

    <br>
    <div class="container" id="limit-container">
        <label id="limit-label" for="user-limit">Profiles visited limit </label>
        <br>
        <input type="number" id="user-limit" name="user-limit" min="1" max="200" value="75" onmouseenter="this.focus(); this.select();">

    </div>
</div>
</form>

<div id="status-notification" class="hidden">
    <div class="notification-content">
        <h3 id="status-title">Parsing Complete!</h3>
        <p id="status-message"></p>
        <div id="error-list"></div>
        <button id="close-notification">OK</button>
    </div>
</div>

<a href="https://github.com/YotaBitOn/Telegram-GiftGraph"><i id='git-icon' class="fa-brands fa-git-alt"></i></a>

<script src="{% static 'graph/script/data_to_graph.js' %}"></script>
</body>
</html>
